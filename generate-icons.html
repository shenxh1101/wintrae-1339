<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成扩展图标</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { color: #6366f1; }
    .icons { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
    .icon-box { text-align: center; }
    canvas { border: 1px solid #e5e7eb; border-radius: 8px; }
    button {
      display: block;
      margin: 8px auto 0;
      padding: 6px 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #4f46e5; }
    .tip {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      color: #4b5563;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>🎨 生成扩展图标</h1>
  <p>点击下方按钮下载图标，保存到 <code>icons/</code> 目录下。</p>
  <div class="icons" id="iconContainer"></div>
  <div class="tip">
    💡 使用说明：分别点击三个「下载」按钮，将文件保存为 <code>icon16.png</code>、<code>icon48.png</code>、<code>icon128.png</code>，放入扩展目录的 <code>icons/</code> 文件夹中。
  </div>

  <script>
    const sizes = [16, 48, 128];
    const container = document.getElementById('iconContainer');

    sizes.forEach(size => {
      const box = document.createElement('div');
      box.className = 'icon-box';

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(1, '#8b5cf6');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      const radius = size * 0.2;
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.fill();

      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.55}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('📝', size / 2, size / 2);

      box.innerHTML = `<p style="font-size:13px;color:#6b7280;">${size}x${size}</p>`;
      box.insertBefore(canvas, box.firstChild);

      const btn = document.createElement('button');
      btn.textContent = '下载';
      btn.onclick = () => {
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      box.appendChild(btn);

      container.appendChild(box);
    });
  </script>
</body>
</html>
